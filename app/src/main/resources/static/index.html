<!-- index.html -->

<!DOCTYPE html> <!-- Step 2: Declare Document Type -->
<html lang="en"> <!-- Step 3: Start HTML Document -->

<head> <!-- Step 4: Head Section -->
  <meta charset="UTF-8"> <!-- Step 5: Character Encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Select Role</title> <!-- Step 6: Page Title -->
  <link rel="icon" href="../assets/images/logo/Logo.png"> <!-- Step 7: Favicon -->

  <!-- Step 8: Stylesheets -->
  <link rel="stylesheet" href="../assets/css/index.css">
  <link rel="stylesheet" href="../assets/css/style.css">

  <!-- Step 9: JavaScript Files with defer -->
  <script src="../js/util.js" defer></script>
  <script src="../js/render.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/footer.js" defer></script>
</head>

<body> <!-- Step 10: Open Body -->

  <!-- Step 11: Container -->
  <div class="container">

    <!-- Step 12: Wrapper -->
    <div class="wrapper">

      <!-- Step 13: Header Placeholder -->
      <div id="header-container"></div>

      <!-- Step 14: Main Section -->
      <main>
        <!-- Step 15: Heading -->
        <h1>Select Your Role</h1>

        <!-- Step 16: Role Buttons -->
        <div class="role-buttons">
          <button id="adminBtn">Admin</button>
          <button id="patientBtn">Patient</button>
          <button id="doctorBtn">Doctor</button>
        </div>
      </main>

      <!-- Step 17: Footer Placeholder -->
      <div id="footer-container"></div>

    </div> <!-- End wrapper -->
  </div> <!-- End container -->

  <!-- Step 18: Modal Structure -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Step 19: Page-Specific Logic -->
  <script type="module" src="../js/pages/index.js"></script>

</body> <!-- Step 20: Close Body -->
</html> <!-- End HTML -->
