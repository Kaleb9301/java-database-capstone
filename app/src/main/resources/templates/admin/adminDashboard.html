<!-- adminDashboard.html -->

<!DOCTYPE html> <!-- Step 1: HTML5 Declaration -->
<html lang="en" xmlns:th="http://www.thymeleaf.org"> <!-- Step 2: Start HTML with Thymeleaf -->

<head> <!-- Step 3: Head Section -->
  <meta charset="UTF-8"> <!-- Step 4: Character Encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title> <!-- Step 6: Page Title -->

  <!-- Step 5: Favicon -->
  <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />

  <!-- Step 7: CSS Stylesheets -->
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />

  <!-- Step 8: JavaScript Files -->
  <script defer th:src="@{/js/util.js}"></script>
  <script defer th:src="@{/js/render.js}"></script>
  <script defer th:src="@{/js/components/header.js}"></script>
  <script defer th:src="@{/js/components/footer.js}"></script>
</head>

<body onload="renderContent()"> <!-- Step 9: Begin Body with onload -->

  <!-- Step 10: Container -->
  <div class="container">

    <!-- Step 11: Wrapper -->
    <div class="wrapper">

      <!-- Step 12: Header Placeholder -->
      <div id="header"></div>

      <!-- Step 13: Main Section -->
      <main class="main-content">

        <!-- Step 14: Search Bar -->
        <input type="text" id="searchBar" placeholder="Search doctors..." />

        <!-- Step 15: Filter Dropdowns -->
        <div class="filters">
          <select id="timeFilter">
            <option value="">All Times</option>
            <option value="AM">AM</option>
            <option value="PM">PM</option>
          </select>

          <select id="specialtyFilter">
            <option value="">All Specialties</option>
            <option value="Cardiologist">Cardiologist</option>
            <option value="Dentist">Dentist</option>
            <option value="Dermatologist">Dermatologist</option>
            <option value="Neurologist">Neurologist</option>
            <!-- Add more specialties as needed -->
          </select>
        </div>

        <!-- Step 16: Content Display Area -->
        <div id="content"></div>

      </main>

      <!-- Step 17: Footer Placeholder -->
      <div id="footer"></div>

    </div> <!-- End wrapper -->
  </div> <!-- End container -->

  <!-- Step 18: Modal Structure -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-button">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- Step 19: Page-Specific JavaScript -->
  <script type="module" th:src="@{/js/adminDashboard.js}" defer></script>
  <script type="module" th:src="@{/js/doctorCard.js}" defer></script>

</body> <!-- Step 20: Close Body -->
</html> <!-- Close HTML -->
