<!-- doctorDashboard.html -->

<!DOCTYPE html> <!-- Step 2: Declare HTML5 Document -->
<html lang="en" xmlns:th="http://www.thymeleaf.org"> <!-- Step 3: Begin HTML with Thymeleaf -->

<head> <!-- Step 4: Head Section -->
  <meta charset="UTF-8"> <!-- Step 5: Character Encoding -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doctor Dashboard</title> <!-- Step 7: Page Title -->

  <!-- Step 6: Favicon -->
  <link rel="icon" type="image/png" th:href="@{/assets/images/logo/logo.png}" />

  <!-- Step 8: Link Stylesheets -->
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}" />

  <!-- Step 9: JavaScript Files (deferred) -->
  <script defer th:src="@{/js/util.js}"></script>
  <script defer th:src="@{/js/render.js}"></script>
  <script defer th:src="@{/js/components/header.js}"></script>
  <script defer th:src="@{/js/components/footer.js}"></script>
  <script type="module" defer th:src="@{/js/doctorDashboard.js}"></script>
</head>

<body onload="renderContent()"> <!-- Step 10: Start Body with onload -->

  <!-- Step 11: Main Container -->
  <div class="container">

    <!-- Step 12: Wrapper -->
    <div class="wrapper">

      <!-- Step 13: Header Placeholder -->
      <div id="header"></div>

      <!-- Step 14: Main Content -->
      <div class="main-content">

        <!-- Step 15: Search Bar -->
        <input
          type="text"
          id="searchBar"
          class="searchBar"
          placeholder="Search Bar for custom output"
        />

        <!-- Step 16: Filter Controls -->
        <div class="filters">
          <button id="todayButton">Today's Appointments</button>
          <input type="date" id="datePicker" />
        </div>

        <!-- Step 17: Patient Table -->
        <table class="patient-table">
          <thead>
            <tr>
              <th>Patient ID</th>
              <th>Name</th>
              <th>Phone No.</th>
              <th>Email</th>
              <th>Prescription</th>
            </tr>
          </thead>
          <tbody id="patientTableBody">
            <!-- Dynamic patient rows will be inserted here -->
          </tbody>
        </table>

      </div> <!-- End Main Content -->

      <!-- Step 18: Footer Placeholder -->
      <div id="footer"></div>

    </div> <!-- Step 19: Close Wrapper -->
  </div> <!-- Close Container -->

</body> <!-- Step 20: Close Body -->
</html> <!-- Close HTML -->
